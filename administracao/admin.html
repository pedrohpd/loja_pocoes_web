<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="adminstyle.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Painel do Alquimista - Administração</title>
</head>
<body>
    <main>
        <div class="container mt-4">
            <h2 class="mb-4 text-white">Gerenciamento de Inventário</h2>

            <div class="admin-section">
                <h4 class="mb-3" style="color: #daff09;">Adicionar Nova Poção / Solução</h4>
                <form id="formAdicionar">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="nome" class="form-label">Nome do Produto</label>
                            <input type="text" class="form-control" id="nome" required placeholder="Ex: Poção da Juventude">
                        </div>
                        <div class="col-md-6">
                            <label for="preco" class="form-label">Preço</label>
                            <input type="number" step="0.01" class="form-control" id="preco" required placeholder="Ex: 500">
                        </div>
                        <div class="col-12">
                            <label for="descricao" class="form-label">Descrição</label>
                            <input type="text" class="form-control" id="descricao" required placeholder="Ex: Rejuvenesce 10 anos por 1 dia">
                        </div>
                        <div class="col-12">
                            <label for="foto" class="form-label">URL da Imagem</label>
                            <input type="url" class="form-control" id="foto" placeholder="Ex: https://exemplo.com/imagem.png">
                        </div>
                        <div class="col-12 text-end">
                            <button type="submit" class="btn-hero" style="border: none; cursor: pointer;">Cadastrar no Inventário</button>
                        </div>
                    </div>
                </form>
            </div>

            <div class="admin-section">
                <h4 class="mb-3" style="color: #daff09;">Produtos Cadastrados</h4>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome do Produto</th>
                                <th>Preço</th>
                                <th class="text-center" colspan="2">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaProdutos">
                            <tr>
                                <td colspan="5" class="text-center text-muted">Consultando grimório de produtos...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalEditar" tabindex="-1" aria-labelledby="modalEditarLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content" style="background: #161722; border: 1px solid #232538;">
                <div class="modal-header" style="border-bottom: 1px solid #232538;">
                    <h5 class="modal-title" id="modalEditarLabel" style="color: #daff09;">Editar Poção</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formEditar">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label for="editNome" class="form-label">Nome do Produto</label>
                            <input type="text" class="form-control" id="editNome" required>
                        </div>
                        <div class="mb-3">
                            <label for="editPreco" class="form-label">Preço</label>
                            <input type="number" step="0.01" class="form-control" id="editPreco" required>
                        </div>
                        <div class="mb-3">
                            <label for="editDescricao" class="form-label">Descrição</label>
                            <input type="text" class="form-control" id="editDescricao" required>
                        </div>
                        <div class="mb-3">
                            <label for="editFoto" class="form-label">URL da Imagem</label>
                            <input type="url" class="form-control" id="editFoto" placeholder="https://exemplo.com/imagem.png">
                        </div>
                    </form>
                </div>
                <div class="modal-footer" style="border-top: 1px solid #232538;">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn-hero" style="border: none; cursor: pointer;" onclick="salvarEdicao()">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-bottom">
            <p>&copy; 1867 Poções e Soluções - Painel Administrativo.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
